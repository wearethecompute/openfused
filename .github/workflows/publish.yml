name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable
          targets: wasm32-wasip1
      - name: Sync version from git tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version --allow-same-version
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable
      - name: Sync versions and publish openfused-core
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Version sync
          for f in rust-port/openfuse-core/Cargo.toml rust-port/openfuse-cli/Cargo.toml daemon/Cargo.toml; do
            sed -i "0,/^version = /s/^version = \".*\"/version = \"$VERSION\"/" "$f"
          done
          # Publish core first — temporarily remove CLI from workspace to avoid
          # resolution of openfused-core from crates.io (it doesn't exist yet)
          sed -i 's|members = \["openfuse-core", "openfuse-cli"\]|members = ["openfuse-core"]|' rust-port/Cargo.toml
          cd rust-port && cargo publish -p openfused-core --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
      - name: Wait for crates.io indexing
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for i in $(seq 1 20); do
            if cargo search openfused-core 2>/dev/null | grep -q "$VERSION"; then
              echo "openfused-core $VERSION indexed"
              exit 0
            fi
            echo "Waiting for crates.io index... ($i/20)"
            sleep 10
          done
          echo "Timeout waiting for crates.io index"
          exit 1
      - name: Publish openfused (CLI)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Restore workspace, replace path dep with published version
          sed -i 's|members = \["openfuse-core"\]|members = ["openfuse-core", "openfuse-cli"]|' rust-port/Cargo.toml
          sed -i "s|openfused-core = { path = \"../openfuse-core\", version = \"[^\"]*\" }|openfused-core = \"$VERSION\"|" rust-port/openfuse-cli/Cargo.toml
          cd rust-port && cargo publish -p openfused --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./daemon
          push: true
          tags: |
            ghcr.io/openfused/openfused:latest
            ghcr.io/openfused/openfused:${{ env.TAG_NAME }}
