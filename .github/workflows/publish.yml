name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable
          targets: wasm32-wasip1
      - name: Sync version from git tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version --allow-same-version
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable
      - name: Sync version from git tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for f in rust-port/openfuse-core/Cargo.toml rust-port/openfuse-cli/Cargo.toml daemon/Cargo.toml; do
            sed -i "0,/^version = /s/^version = \".*\"/version = \"$VERSION\"/" "$f"
          done
          # Replace path+version dep with version-only dep for crates.io publishing
          sed -i "s|openfused-core = { path = \"../openfuse-core\", version = \"[^\"]*\" }|openfused-core = \"$VERSION\"|" rust-port/openfuse-cli/Cargo.toml
      - name: Publish openfused-core
        run: cd rust-port/openfuse-core && cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
      - name: Wait for crates.io indexing
        run: sleep 30
      - name: Publish openfused (CLI)
        run: cd rust-port/openfuse-cli && cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./daemon
          push: true
          tags: |
            ghcr.io/openfused/openfused:latest
            ghcr.io/openfused/openfused:${{ env.TAG_NAME }}
